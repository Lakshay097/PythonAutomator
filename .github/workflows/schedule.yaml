name: Sync JotForm to Google Sheets

on:
  schedule:
    # 10:00 AM IST = 04:30 UTC  → runs irf_sync.py
    - cron: '30 4 * * *'
    # 10:30 AM IST = 05:00 UTC  → runs irf_sync2.py
    - cron: '0 5 * * *'
  workflow_dispatch:  # Manual trigger from GitHub Actions tab

jobs:

  # ── Job 1: 10:00 AM IST ──────────────────────────────────────────────────
  sync-sheet-1:
    name: Sync → IRF Data sheet (10 AM IST)
    runs-on: ubuntu-latest
    if: github.event.schedule == '30 4 * * *' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Write Google credentials to file
        run: echo '${{ secrets.GOOGLE_CREDENTIALS_JSON }}' > credentials.json

      - name: Run irf_sync.py
        env:
          JOTFORM_API_KEY:         ${{ secrets.JOTFORM_API_KEY }}
          JOTFORM_FORM_ID:         ${{ secrets.JOTFORM_FORM_ID }}
          GOOGLE_SHEET_NAME:       ${{ secrets.GOOGLE_SHEET_NAME }}
          GOOGLE_WORKSHEET_NAME:   ${{ secrets.GOOGLE_WORKSHEET_NAME }}
          GOOGLE_CREDENTIALS_PATH: credentials.json
        run: python irf_sync.py

      - name: Clean up credentials
        if: always()
        run: rm -f credentials.json

  # ── Job 2: 10:30 AM IST ──────────────────────────────────────────────────
  sync-sheet-2:
    name: Sync → IRF AdminSheet (10:30 AM IST)
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 5 * * *' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Write Google credentials to file
        run: echo '${{ secrets.GOOGLE_CREDENTIALS_JSON }}' > credentials.json

      - name: Run irf_sync2.py
        env:
          JOTFORM_API_KEY:         ${{ secrets.JOTFORM_API_KEY }}
          JOTFORM_FORM_ID:         ${{ secrets.JOTFORM_FORM_ID }}
          GOOGLE_SHEET_NAME_2:     ${{ secrets.GOOGLE_SHEET_NAME_2 }}
          GOOGLE_WORKSHEET_NAME_2: ${{ secrets.GOOGLE_WORKSHEET_NAME_2 }}
          GOOGLE_CREDENTIALS_PATH: credentials.json
        run: python irf_sync2.py

      - name: Clean up credentials
        if: always()
        run: rm -f credentials.json