name: Sync All Sheets (10 AM IST - Sequential)

on:
  schedule:
    # 10:00 AM IST = 04:30 UTC
    - cron: '20 4 * * *'
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  sync-sheet-1:
    name: "Step 1 → IRF Data Sheet (irf_sync.py)"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.2.2

      - name: Set up Python 3.13
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Write Google credentials to file
        run: echo '${{ secrets.GOOGLE_CREDENTIALS_JSON }}' > credentials.json

      - name: Run irf_sync.py
        env:
          JOTFORM_API_KEY:         ${{ secrets.JOTFORM_API_KEY }}
          JOTFORM_FORM_ID:         ${{ secrets.JOTFORM_FORM_ID }}
          GOOGLE_SHEET_NAME:       ${{ secrets.GOOGLE_SHEET_NAME }}
          GOOGLE_WORKSHEET_NAME:   ${{ secrets.GOOGLE_WORKSHEET_NAME }}
          GOOGLE_CREDENTIALS_PATH: credentials.json
        run: python irf_sync.py

      - name: Clean up credentials
        if: always()
        run: rm -f credentials.json

  sync-sheet-2:
    name: "Step 2 → IRF AdminSheet (irf_sync2.py)"
    runs-on: ubuntu-latest
    needs: sync-sheet-1  # waits for Step 1 to finish

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.2.2

      - name: Set up Python 3.13
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Write Google credentials to file
        run: echo '${{ secrets.GOOGLE_CREDENTIALS_JSON }}' > credentials.json

      - name: Run irf_sync2.py
        env:
          JOTFORM_API_KEY:         ${{ secrets.JOTFORM_API_KEY }}
          JOTFORM_FORM_ID:         ${{ secrets.JOTFORM_FORM_ID }}
          GOOGLE_SHEET_NAME_2:     ${{ secrets.GOOGLE_SHEET_NAME_2 }}
          GOOGLE_WORKSHEET_NAME_2: ${{ secrets.GOOGLE_WORKSHEET_NAME_2 }}
          GOOGLE_CREDENTIALS_PATH: credentials.json
        run: python irf_sync2.py

      - name: Clean up credentials
        if: always()
        run: rm -f credentials.json

  sync-sheet-3:
    name: "Step 3 → Approval Status Sheet (irf_sync3.py)"
    runs-on: ubuntu-latest
    needs: sync-sheet-2  # waits for Step 2 to finish

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.2.2

      - name: Set up Python 3.13
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Write Google credentials to file
        run: echo '${{ secrets.GOOGLE_CREDENTIALS_JSON }}' > credentials.json

      - name: Run irf_sync3.py
        env:
          JOTFORM_API_KEY:         ${{ secrets.JOTFORM_API_KEY }}
          JOTFORM_FORM_ID:         ${{ secrets.JOTFORM_FORM_ID }}
          JOTFORM_BASE_URL:        https://pw.jotform.com/API
          GOOGLE_SHEET_NAME_3:     ${{ secrets.GOOGLE_SHEET_NAME_3 }}
          GOOGLE_WORKSHEET_NAME_3: ${{ secrets.GOOGLE_WORKSHEET_NAME_3 }}
          START_DATE:              ${{ secrets.START_DATE }}
          GOOGLE_CREDENTIALS_PATH: credentials.json
        run: python irf_sync3.py

      - name: Clean up credentials
        if: always()
        run: rm -f credentials.json